<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
      background: #fef7e8; 
      font-family: sans-serif; 
      padding: 15px; 
      color: #444; 
      line-height: 1.5; 
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container { 
      max-width: 500px; 
      margin: 0 auto; 
      background: white; 
      border-radius: 25px; 
      padding: 40px 20px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      text-align: center; 
    }
    
    .logo { 
      width: 120px; 
      height: auto; 
      margin-bottom: 20px; 
      animation: gentleFloat 2s ease-in-out infinite;
    }
    
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    
    /* 甜甜圈動畫 */
    .donut {
      width: 60px;
      height: 60px;
      margin: 20px auto;
      position: relative;
    }
    
    .donut:before {
      content: '';
      display: block;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 6px solid #f9ebda;
      border-top-color: #c26e3c;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 小愛心飄落 */
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }
    
    .heart {
      position: absolute;
      font-size: 20px;
      color: #c26e3c;
      opacity: 0.6;
      animation: floatUp 4s ease-out forwards;
    }
    
    @keyframes floatUp {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0.6;
      }
      100% {
        transform: translateY(-20vh) rotate(360deg);
        opacity: 0;
      }
    }
    
    .loading-text {
      font-size: 1.1rem;
      color: #c26e3c;
      margin-top: 20px;
      font-weight: 500;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    
    .loading-sub {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 8px;
    }
    
    .dot-floating {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #c26e3c;
      margin: 0 3px;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    
    .dot-floating:nth-child(1) { animation-delay: 0s; }
    .dot-floating:nth-child(2) { animation-delay: 0.2s; }
    .dot-floating:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes dotPulse {
      0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
      30% { transform: scale(1.2); opacity: 1; }
    }
    
    h1 { color: #c26e3c; font-size: 1.3rem; margin-bottom: 20px; margin-top: 5px; }
    form { text-align: left; }
    .q-box { background: #fffaf2; padding: 18px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #f9ebda; }
    .q-title { font-weight: bold; display: block; color: #5a3e2b; margin-bottom: 15px; font-size: 1rem; border-left: 4px solid #c26e3c; padding-left: 10px; }
    .opt-item { display: flex; align-items: flex-start; margin-bottom: 12px; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; }
    .opt-item:hover { background: #fdf2e4; }
    input[type="radio"] { margin-right: 12px; margin-top: 4px; transform: scale(1.3); }
    .opt-text { font-size: 0.95rem; color: #666; }
    select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-top: 5px; box-sizing: border-box; font-size: 1rem; }
    button { width: 100%; padding: 16px; background: #c26e3c; color: white; border: none; border-radius: 30px; margin-top: 25px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: opacity 0.2s; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    label { font-weight: bold; color: #5a3e2b; display: block; margin-bottom: 5px; margin-top: 15px; }
  </style>
</head>
<body>
  <!-- 飄浮愛心容器 -->
  <div class="hearts" id="heartsContainer"></div>

  <div class="container" id="loadingContainer">
    <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="一點甜 LOGO" class="logo">
    <div class="donut"></div>
    <div class="loading-text" id="loadingText">
      <span id="mainMessage">正在為你的生活，加入一點甜...</span>
      <div class="dot-floating"></div>
      <div class="dot-floating"></div>
      <div class="dot-floating"></div>
    </div>
    <div class="loading-sub" id="subMessage">捕捉今日份的甜，請稍候片刻</div>
  </div>
  
  <div class="container" id="questionContainer" style="display:none;">
    <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="一點甜 LOGO" class="logo">
    <h1 id="actTitle">一點甜品評問卷</h1>
    
    <form id="quiz">
      <label>🍦 請選擇試吃品項</label>
      <select id="flavorSelect" required></select>
      
      <div id="dynamicQuestions" style="margin-top: 25px;"></div>

      <label>✍️ 您的具體建議</label>
      <textarea id="comment" rows="3" placeholder="例如：甜度、份量、口感..."></textarea>
      
      <button type="submit" id="subBtn">提交問卷 領優惠券</button>
    </form>
  </div>

  <script>
    let userId = null;
    let liff = null;
    let heartInterval = null;
    let textInterval = null;
    
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyQVWYgnKGP-W5ddxOoLprz_f3s2rxn7HwtoeQ7KxpJ4cL_42n16Q_IP7jsoJZBa9qD/exec';
    const LIFF_ID = '2009574561-O1KcpV0n';
    
    // 可愛文案庫
    const mainMessages = [
      "正在為你的生活，加入一點甜...",
      "捕捉今日份的甜，請稍候片刻...",
      "心意準備中，等等來點甜的吧！",
      "攪拌一點糖霜，灑上幸福...",
      "烘焙師正在準備驚喜...",
      "甜甜的空氣正在醞釀...",
      "為你特製一份甜蜜問卷...",
      "糖分加載中，請深呼吸...",
    ];
    
    const subMessages = [
      "捕捉今日份的甜，請稍候片刻",
      "偷偷加了一匙幸福感",
      "問卷正在發酵中～",
      "再一下下就好！",
      "耐心等待會更甜喔",
      "正在打包你的優惠券",
      "快準備好你的甜點雷達",
    ];
    
    // 隨機更換文案
    function startMessageRotation() {
      textInterval = setInterval(() => {
        const randomMain = mainMessages[Math.floor(Math.random() * mainMessages.length)];
        const randomSub = subMessages[Math.floor(Math.random() * subMessages.length)];
        
        const mainEl = document.getElementById('mainMessage');
        const subEl = document.getElementById('subMessage');
        
        if (mainEl) {
          mainEl.style.opacity = '0';
          setTimeout(() => {
            mainEl.innerText = randomMain;
            mainEl.style.opacity = '1';
          }, 300);
        }
        
        if (subEl) {
          subEl.style.opacity = '0';
          setTimeout(() => {
            subEl.innerText = randomSub;
            subEl.style.opacity = '1';
          }, 300);
        }
      }, 3500);
    }
    
    // 產生飄浮愛心
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = ['❤️', '🧡', '💛', '💖', '🍰', '🍩', '🍪'][Math.floor(Math.random() * 7)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
      heart.style.animationDelay = Math.random() * 2 + 's';
      
      document.getElementById('heartsContainer').appendChild(heart);
      
      setTimeout(() => {
        heart.remove();
      }, 5000);
    }
    
    function startHearts() {
      heartInterval = setInterval(createHeart, 800);
    }
    
    function stopAnimations() {
      if (heartInterval) clearInterval(heartInterval);
      if (textInterval) clearInterval(textInterval);
      const heartsContainer = document.getElementById('heartsContainer');
      if (heartsContainer) heartsContainer.innerHTML = '';
    }
    
    async function initialize() {
      try {
        startHearts();
        startMessageRotation();
        
        await loadLiffScript();
        
        document.querySelector('.donut').style.display = 'block';
        
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        
        const profile = await liff.getProfile();
        userId = profile.userId;
        
        await loadQuestionnaireData();
        
      } catch (error) {
        console.error('初始化失敗:', error);
        stopAnimations();
        document.getElementById('loadingContainer').innerHTML = `
          <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="一點甜 LOGO" class="logo">
          <div style="color:#d32f2f; padding:20px;">❌ ${error.message}</div>
          <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#c26e3c;color:white;border:none;border-radius:8px;">重新載入</button>
        `;
      }
    }
    
    function loadLiffScript() {
      return new Promise((resolve, reject) => {
        if (window.liff) {
          liff = window.liff;
          resolve();
          return;
        }
        const script = document.createElement('script');
        script.src = 'https://static.line-scdn.net/liff/edge/2.1/sdk.js';
        script.onload = () => { liff = window.liff; resolve(); };
        script.onerror = () => reject(new Error('LIFF SDK 載入失敗'));
        document.head.appendChild(script);
      });
    }
    
    async function loadQuestionnaireData() {
      const response = await fetch(`${GAS_URL}?action=getQuestionnaire&t=${Date.now()}`);
      const data = await response.json();
      
      if (data.success) {
        stopAnimations();
        document.getElementById('loadingContainer').style.display = 'none';
        document.getElementById('questionContainer').style.display = 'block';
        setupQuestionnaire(data);
      } else {
        throw new Error(data.message);
      }
    }
    
    function setupQuestionnaire(data) {
      const { actName, flavorList, questions } = data;
      document.getElementById('actTitle').innerText = actName;
      
      const select = document.getElementById('flavorSelect');
      select.innerHTML = '<option value="">請選擇品項</option>';
      flavorList.forEach(f => {
        let opt = document.createElement('option');
        opt.value = f; opt.innerText = f;
        select.appendChild(opt);
      });
      
      const qContainer = document.getElementById('dynamicQuestions');
      qContainer.innerHTML = '';
      questions.forEach((q, qIdx) => {
        let optionsHtml = q.options.map((optLabel, oIdx) => {
          const score = 5 - oIdx;
          return `<label class="opt-item"><input type="radio" name="q${qIdx}" value="${score}" required><span class="opt-text">${escapeHtml(optLabel)}</span></label>`;
        }).join('');
        
        qContainer.innerHTML += `<div class="q-box"><span class="q-title">${qIdx + 1}. ${escapeHtml(q.title)}</span><div>${optionsHtml}</div></div>`;
      });
      
      document.getElementById('quiz').onsubmit = async function(e) {
        e.preventDefault();
        if (!select.value) {
          alert('請選擇試吃品項');
          return;
        }
        
        const btn = document.getElementById('subBtn');
        btn.disabled = true;
        btn.innerText = "傳送中...";
        
        const scores = questions.map((_, idx) => {
          const checked = document.querySelector(`input[name="q${idx}"]:checked`);
          return checked ? checked.value : "0";
        });
        
        try {
          const response = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'saveFeedback',
              userId: userId,
              actName: actName,
              flavor: select.value,
              scores: scores,
              comment: document.getElementById('comment').value
            })
          });
          
          const result = await response.json();
          
          if (result.success) {
            document.body.innerHTML = `<div style="text-align:center;padding:100px 20px;background:#fef7e8;min-height:100vh;"><img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" style="width:100px;"><br><h2 style="color:#c26e3c;">🎉 提交成功！</h2><p>優惠券已發送到您的 LINE 視窗。<br>請回對話視窗領取！</p><button onclick="if(window.liff) liff.closeWindow(); else window.close();" style="margin-top:20px;padding:10px 20px;background:#c26e3c;color:white;border:none;border-radius:8px;">關閉視窗</button></div>`;
          } else {
            throw new Error(result.message);
          }
        } catch(error) {
          btn.disabled = false;
          btn.innerText = "提交問卷 領優惠券";
          alert('提交失敗：' + error.message);
        }
      };
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    initialize();
  </script>
</body>
</html>
