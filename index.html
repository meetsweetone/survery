<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>一點甜｜Gelato霜淇淋試吃回饋</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fdf8ed;
            font-family: 'Segoe UI', 'Noto Sans TC', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            color: #3e2a2a;
        }

        .card {
            max-width: 560px;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .hero {
            background: #f4d1d7;
            padding: 28px 24px 24px 24px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: auto;
            margin-bottom: 12px;
        }

        .hero h2 {
            font-size: 24px;
            font-weight: 700;
            color: #4a2a2a;
            margin-bottom: 6px;
        }

        .hero .sub {
            font-size: 13px;
            color: #6a4a4a;
        }

        .form-container {
            padding: 28px 24px 32px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
            color: #5a3a2a;
        }

        .custom-select {
            position: relative;
            width: 100%;
        }

        select {
            width: 100%;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 500;
            border: 2px solid #f0d5d5;
            border-radius: 20px;
            background: #ffffff;
            transition: all 0.3s ease;
            font-family: inherit;
            color: #4a3a3a;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e0a5b0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 20px;
        }

        select:hover {
            border-color: #d4a5b0;
            background: #fffef8;
            box-shadow: 0 4px 12px rgba(244, 209, 215, 0.3);
        }

        select:focus {
            outline: none;
            border-color: #e0a5b0;
            box-shadow: 0 0 0 4px rgba(244, 209, 215, 0.5);
        }

        .btn-submit {
            width: 100%;
            background: #f4d1d7;
            color: #5a3a3a;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 44px;
            margin-top: 12px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: #e8c0ca;
            transform: scale(1.01);
        }

        .btn-submit:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .sweet-note {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #c0a07a;
            border-top: 1px dashed #ffdfb8;
            padding-top: 20px;
        }

        .loading-state {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #ffe0bf;
            border-top: 3px solid #f4d1d7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 美化彈出卡片 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .success-card {
            background: white;
            max-width: 300px;
            width: 85%;
            border-radius: 32px;
            text-align: center;
            padding: 28px 20px 32px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-overlay.active .success-card {
            transform: scale(1);
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background: #f4d1d7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 38px;
        }

        .success-card h3 {
            font-size: 22px;
            color: #4a2a2a;
            margin-bottom: 12px;
        }

        .success-card p {
            font-size: 15px;
            color: #7a5a5a;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .close-modal-btn {
            background: #f4d1d7;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: #4a2a2a;
            cursor: pointer;
            width: 80%;
        }

        .close-modal-btn:hover {
            background: #e8bfc7;
        }

        @media (max-width: 500px) {
            body { padding: 12px; }
            .form-container { padding: 20px; }
            select { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<div id="successModal" class="modal-overlay">
    <div class="success-card">
        <div class="success-icon">🍦</div>
        <h3>問卷已送出！</h3>
        <p>優惠券將透過 LINE 發送給您<br>感謝您的寶貴意見</p>
        <button class="close-modal-btn" onclick="closeModalAndCloseWindow()">好的 ✨</button>
    </div>
</div>

<div class="card">
    <div class="hero">
        <img class="logo" src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="一點甜" onerror="this.style.display='none'">
        <h2>🍦 一點甜 Gelato霜淇淋<br>試吃回饋</h2>
        <div class="sub">填寫回饋 · 領取限定優惠</div>
    </div>

    <div class="form-container">
        <div id="loadingArea" class="loading-state" style="display:none;">
            <div class="spinner"></div>
            <p>正在為你的生活，加入一點甜... 🍰</p>
        </div>

        <form id="quizForm">
            <div class="form-group">
                <label>🍦 試吃品項</label>
                <div class="custom-select">
                    <select id="item" required>
                        <option value="" disabled selected>請選擇</option>
                        <option value="純粹香草 Gelato">🍦 純粹香草 Gelato</option>
                        <option value="初戀草莓Gelato">🍓 初戀草莓Gelato</option>
                        <option value="微苦抹綠Gelato">🍵 微苦抹綠Gelato</option>
                        <option value="金黃南瓜Gelato">🎃 金黃南瓜Gelato</option>
                        <option value="深焙拿鐵Gelato">☕ 深焙拿鐵Gelato</option>
                        <option value="焙煎黑芝麻Gelato">🖤 焙煎黑芝麻Gelato</option>
                        <option value="經典醇乳酪Gelato">🧀 經典醇乳酪Gelato</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>👁️ 視覺吸引力</label>
                <div class="custom-select">
                    <select id="visual" required>
                        <option value="" disabled selected>請選擇</option>
                        <option value="🤩 線條完美，想拍照紀錄">🤩 線條完美，想拍照紀錄</option>
                        <option value="😊 精緻有質感，視覺加分">😊 精緻有質感，視覺加分</option>
                        <option value="😐 外觀中規中矩">😐 外觀中規中矩</option>
                        <option value="😟 外型略微塌陷">😟 外型略微塌陷</option>
                        <option value="❌ 賣相不夠吸引人">❌ 賣相不夠吸引人</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>😋 極致口感</label>
                <div class="custom-select">
                    <select id="texture" required>
                        <option value="" disabled selected>請選擇</option>
                        <option value="🤩 細膩絲滑，像慕斯般柔軟">🤩 細膩絲滑，像慕斯般柔軟</option>
                        <option value="😊 口感滑順，完全無冰晶">😊 口感滑順，完全無冰晶</option>
                        <option value="😐 表現一般，化開速度稍快">😐 表現一般，化開速度稍快</option>
                        <option value="😟 口感不均，帶有碎冰感">😟 口感不均，帶有碎冰感</option>
                        <option value="❌ 質地偏水或過於黏膩">❌ 質地偏水或過於黏膩</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>⚖️ 風味平衡</label>
                <div class="custom-select">
                    <select id="balance" required>
                        <option value="" disabled selected>請選擇</option>
                        <option value="🤩 乳香醇厚，甜而不膩">🤩 乳香醇厚，甜而不膩</option>
                        <option value="😊 香氣足夠，甜度適中">😊 香氣足夠，甜度適中</option>
                        <option value="😐 味道還可以，甜度偏高">😐 味道還可以，甜度偏高</option>
                        <option value="😟 風味平淡，奶香不突出">😟 風味平淡，奶香不突出</option>
                        <option value="❌ 比例失衡，吃完想喝水">❌ 比例失衡，吃完想喝水</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>👤 您的性別</label>
                <div class="custom-select">
                    <select id="gender" required>
                        <option value="" disabled selected>請選擇</option>
                        <option value="我是帥哥">👦 我是帥哥</option>
                        <option value="我是美人兒">👧 我是美人兒</option>
                      </select>
                </div>
            </div>

            <div class="form-group">
                <label>📅 您的年紀</label>
                <div class="custom-select">
                    <select id="age" required>
                        <option value="" disabled selected>請選擇</option>
                        <option value="12歲以下">🍼 12歲以下</option>
                        <option value="13-18歲">📚 13-18歲</option>
                        <option value="19-28歲">🎓 19-28歲</option>
                        <option value="29-38歲">💼 29-38歲</option>
                        <option value="39-48歲">🌟 39-48歲</option>
                        <option value="49-59歲">🍷 49-59歲</option>
                        <option value="60歲以上">👴 60歲以上</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                ✨ 提交問卷 · 領優惠券 ✨
            </button>
            <div class="sweet-note">
                🧁 每一份意見，都是我們更甜蜜的動力
            </div>
        </form>
    </div>
</div>

<script>
    const LIFF_ID = '2009574561-O1KcpV0n';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTugMVmQ4dWa3DXvuXoZKHOsR5qtkXpbnzlLh0eN6Lel-SU4p7I3YOD2aGbdYnLPtR/exec';
    let userId = "";

    function showSuccessModal() {
        const modal = document.getElementById('successModal');
        modal.classList.add('active');
    }

    function closeModalAndCloseWindow() {
        const modal = document.getElementById('successModal');
        modal.classList.remove('active');
        if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
            liff.closeWindow();
        }
    }

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
            liff.login();
        } else {
            const profile = await liff.getProfile();
            userId = profile.userId;
            document.getElementById('loadingArea').style.display = 'none';
            document.getElementById('quizForm').style.display = 'block';
        }
    }

    document.getElementById('quizForm').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = "📨 提交中，請稍後...";

        const payload = {
            userId: userId,
            activity: "一點甜 Gelato霜淇淋試吃回饋",
            item: document.getElementById('item').value,
            visual: document.getElementById('visual').value,
            texture: document.getElementById('texture').value,
            balance: document.getElementById('balance').value,
            identity: document.getElementById('gender').value,
            age: document.getElementById('age').value
        };

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            showSuccessModal();
        } catch (err) {
            alert('發送失敗，請稍後再試');
            submitBtn.disabled = false;
            submitBtn.innerHTML = "✨ 提交問卷 · 領優惠券 ✨";
        }
    };

    init();
</script>
</body>
</html>
