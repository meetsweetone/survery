<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>一點甜｜試吃回饋問卷</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 這裡完整保留你最愛的漂亮樣式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fdf8ed; font-family: 'Noto Sans TC', sans-serif; padding: 20px; color: #3e2a2a; }
        .card { max-width: 560px; margin: 0 auto; background: white; border-radius: 36px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden; }
        .hero { background: #f4d1d7; padding: 28px 24px; text-align: center; color: #5a3a3a; }
        .logo { width: 80px; margin-bottom: 12px; }
        .hero h2 { font-size: 24px; font-weight: 700; color: #4a2a2a; }
        .form-container { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 15px; color: #5a3a2a; }
        label i { font-style: normal; margin-right: 6px; }
        select { 
            width: 100%; padding: 14px 18px; font-size: 16px; border: 2px solid #f0d5d5; 
            border-radius: 20px; background: #ffffff; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e0a5b0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 18px center; background-size: 20px;
        }
        .btn-submit { 
            width: 100%; background: #f4d1d7; color: #5a3a3a; border: none; padding: 16px; 
            font-size: 18px; font-weight: 700; border-radius: 44px; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { background: #e8c0ca; transform: scale(1.02); }
        /* 彈出視窗樣式 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1000; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .success-card { background: white; width: 85%; max-width: 300px; border-radius: 32px; padding: 30px; text-align: center; }
        .close-modal-btn { background: #f4d1d7; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="successModal" class="modal-overlay">
    <div class="success-card">
        <div style="font-size: 40px; margin-bottom: 10px;">🎉</div>
        <h3>問卷已送出！</h3>
        <p>優惠券將透過 LINE 發送<br>感謝您的寶貴意見 🍰</p>
        <button class="close-modal-btn" onclick="closeModalAndCloseWindow()">好的 ✨</button>
    </div>
</div>

<div class="card">
    <div class="hero">
        <img class="logo" src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="Logo">
        <h2 id="actName">遇見你，就是一點甜...</h2>
        <div style="font-size: 14px; opacity: 0.8;">填寫回饋 · 領取限定優惠</div>
    </div>

    <div class="form-container">
        <div id="loadingArea" style="text-align: center; padding: 30px;">
            <p>攪拌甜蜜中... 🍰</p>
        </div>

        <form id="quizForm" style="display: none;">
            <div class="form-group"><label><i>🍰</i> 試吃品項</label><select id="item" required></select></div>
            <div class="form-group"><label><i>👁️</i> 視覺吸引力</label><select id="visual" required></select></div>
            <div class="form-group"><label><i>😋</i> 極致口感</label><select id="texture" required></select></div>
            <div class="form-group"><label><i>⚖️</i> 風味平衡</label><select id="balance" required></select></div>
            <div class="form-group"><label><i>👥</i> 您的性別</label><select id="identity" required></select></div>
            <div class="form-group"><label><i>📅</i> 您的年紀</label><select id="age" required></select></div>
            <button type="submit" class="btn-submit" id="submitBtn">✨ 提交問卷 · 領優惠券 ✨</button>
        </form>
    </div>
</div>

<script>
    const LIFF_ID = '2009574561-O1KcpV0n';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTugMVmQ4dWa3DXvuXoZKHOsR5qtkXpbnzlLh0eN6Lel-SU4p7I3YOD2aGbdYnLPtR/exec';
    
    // ⭐ 直接定義資料，確保 Emoji 顯示
    const QUIZ_DATA = {
        title: "遇見你，就是一點甜...",
        items: ["霜淇淋 A", "霜淇淋 B"], 
        visuals: ["🤩 線條完美，想拍照紀錄", "😊 精緻有質感，視覺加分", "😐 外觀中規中矩", "😟 外型略微塌陷", "❌ 賣相不夠吸引人"],
        texture: ["🤩 細膩絲滑，像慕斯般柔軟", "😊 口感滑順，完全無冰晶", "😐 表現一般，化開速度稍快", "😟 口感不均，帶有碎冰感", "❌ 質地偏水或過於黏膩"],
        balance: ["🤩 乳香醇厚，甜而不膩", "😊 香氣足夠，甜度適中", "😐 味道還可以，甜度偏高", "😟 風味平淡，奶香不突出", "❌ 比例失衡，吃完想喝水"],
        identity: ["女生", "男生"],
        age: ["18歲以下", "18-25歲", "26-35歲", "36-45歲", "46-55歲", "56-65歲", "65歲以上"]
    };

    let userId = "";

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); } 
        else {
            const profile = await liff.getProfile();
            userId = profile.userId;
            renderQuizDirectly(); // 👈 身分確認後立刻顯示
        }
    }

    function renderQuizDirectly() {
        document.getElementById('actName').innerText = QUIZ_DATA.title;
        fillSelect('item', QUIZ_DATA.items);
        fillSelect('visual', QUIZ_DATA.visuals);
        fillSelect('texture', QUIZ_DATA.texture);
        fillSelect('balance', QUIZ_DATA.balance);
        fillSelect('identity', QUIZ_DATA.identity);
        fillSelect('age', QUIZ_DATA.age);
        document.getElementById('loadingArea').style.display = 'none';
        document.getElementById('quizForm').style.display = 'block';
    }

    function fillSelect(id, list) {
        const el = document.getElementById(id);
        el.innerHTML = '<option value="" disabled selected>請選擇</option>';
        list.forEach(txt => {
            const opt = document.createElement('option');
            opt.value = opt.text = txt;
            el.appendChild(opt);
        });
    }

    function closeModalAndCloseWindow() {
        liff.closeWindow();
    }

    document.getElementById('quizForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = "📨 提交中...";

        const payload = {
            userId: userId,
            activity: QUIZ_DATA.title,
            item: document.getElementById('item').value,
            visual: document.getElementById('visual').value,
            texture: document.getElementById('texture').value,
            balance: document.getElementById('balance').value,
            identity: document.getElementById('identity').value,
            age: document.getElementById('age').value
        };

        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            document.getElementById('successModal').classList.add('active');
        } catch (err) {
            alert('發送失敗');
            btn.disabled = false;
        }
    };

    init();
</script>
</body>
</html>
