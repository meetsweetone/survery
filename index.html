<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動問卷</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        select, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #00b900; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2 id="actName">載入中...</h2>
    <form id="quizForm">
        <label>試吃品項</label><select id="item" required></select>
        <label>視覺吸引力</label><select id="visual" required></select>
        <label>極致口感</label><select id="texture" required></select>
        <label>風味平衡</label><select id="balance" required></select>
        <label>使用者身分</label><select id="identity" required></select>
        <label>您的年紀</label><select id="age" required></select>
        <button type="submit" id="submitBtn">提交問卷</button>
    </form>

    <script>
        const LIFF_ID = '2009574561-O1KcpV0n';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTugMVmQ4dWa3DXvuXoZKHOsR5qtkXpbnzlLh0eN6Lel-SU4p7I3YOD2aGbdYnLPtR/exec'; // 部署為 Web App 後產生的 URL
        let userId = "";

        async function init() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userId = profile.userId;
                fetchOptions();
            }
        }

        async function fetchOptions() {
            const resp = await fetch(GAS_URL);
            const data = await resp.json();
            document.getElementById('actName').innerText = data.title;
            fillSelect('item', data.items);
            fillSelect('visual', data.visuals);
            fillSelect('texture', data.texture);
            fillSelect('balance', data.balance);
            fillSelect('identity', data.identity);
            fillSelect('age', data.age);
        }

        function fillSelect(id, list) {
            const el = document.getElementById(id);
            list.forEach(txt => {
                const opt = document.createElement('option');
                opt.value = opt.text = txt;
                el.add(opt);
            });
        }

        document.getElementById('quizForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "提交中...";

            const payload = {
                userId: userId,
                activity: document.getElementById('actName').innerText,
                item: document.getElementById('item').value,
                visual: document.getElementById('visual').value,
                texture: document.getElementById('texture').value,
                balance: document.getElementById('balance').value,
                identity: document.getElementById('identity').value,
                age: document.getElementById('age').value
            };

            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            alert('問卷已提交，優惠券將發送至您的 LINE！');
            liff.closeWindow();
        };

        init();
    </script>
</body>
</html>
