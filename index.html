<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>一點甜｜試吃回饋問卷</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fdf8ed;
            font-family: 'Segoe UI', 'Noto Sans TC', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            color: #3e2a2a;
        }

        /* 主卡片 */
        .card {
            max-width: 560px;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 頭部區塊 - 底色 #f4d1d7 */
        .hero {
            background: #f4d1d7;
            padding: 28px 24px 24px 24px;
            text-align: center;
            color: #5a3a3a;
        }

        .logo {
            width: 80px;
            height: auto;
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
        }

        .hero h2 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: #4a2a2a;
        }

        .hero .sub {
            font-size: 14px;
            opacity: 0.85;
            color: #6a4a4a;
        }

        /* 表單內容區 */
        .form-container {
            padding: 28px 24px 32px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
            color: #5a3a2a;
            letter-spacing: 0.5px;
        }

        label i {
            color: #e88d4a;
            font-style: normal;
            margin-right: 4px;
        }

        /* ===== 質感下拉式選單 ===== */
        .custom-select {
            position: relative;
            width: 100%;
        }

        select {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 500;
            border: 2px solid #f0d5d5;
            border-radius: 20px;
            background: #ffffff;
            transition: all 0.3s ease;
            font-family: inherit;
            color: #4a3a3a;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e0a5b0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        /* 選單懸停與聚焦效果 */
        select:hover {
            border-color: #d4a5b0;
            background: #fffef8;
            box-shadow: 0 4px 12px rgba(244, 209, 215, 0.3);
        }

        select:focus {
            outline: none;
            border-color: #e0a5b0;
            box-shadow: 0 0 0 4px rgba(244, 209, 215, 0.5);
            background: #ffffff;
        }

        /* 選單內部選項樣式 */
        select option {
            padding: 14px;
            background: white;
            color: #4a3a3a;
            font-size: 15px;
            font-weight: 500;
        }

        /* 提交按鈕 - 改為 #f4d1d7 */
        .btn-submit {
            width: 100%;
            background: #f4d1d7;
            color: #5a3a3a;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 44px;
            margin-top: 12px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: #e8c0ca;
            transform: scale(1.01);
            box-shadow: 0 8px 18px rgba(244, 209, 215, 0.5);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.65;
            transform: none;
            cursor: not-allowed;
        }

        /* 小甜點裝飾 */
        .sweet-note {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #c0a07a;
            border-top: 1px dashed #ffdfb8;
            padding-top: 20px;
        }

        /* 載入狀態 */
        .loading-state {
            text-align: center;
            padding: 40px 20px;
            color: #b97f4b;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #ffe0bf;
            border-top: 3px solid #f4d1d7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== 美化後的彈出卡片 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .success-card {
            background: white;
            max-width: 300px;
            width: 85%;
            border-radius: 32px;
            text-align: center;
            padding: 28px 20px 32px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-overlay.active .success-card {
            transform: scale(1);
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background: #f4d1d7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 38px;
        }

        .success-card h3 {
            font-size: 22px;
            color: #4a2a2a;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .success-card p {
            font-size: 15px;
            color: #7a5a5a;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .close-modal-btn {
            background: #f4d1d7;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: #4a2a2a;
            cursor: pointer;
            transition: all 0.2s;
            width: 80%;
        }

        .close-modal-btn:hover {
            background: #e8bfc7;
            transform: scale(1.02);
        }

        /* 手機最佳化 */
        @media (max-width: 500px) {
            body { padding: 12px; }
            .form-container { padding: 20px; }
            .hero h2 { font-size: 22px; }
            select { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<!-- 美化的彈出視窗 Modal -->
<div id="successModal" class="modal-overlay">
    <div class="success-card">
        <div class="success-icon">🎉</div>
        <h3>問卷已送出！</h3>
        <p>優惠券將透過 LINE 發送給您<br>感謝您的寶貴意見 🍰</p>
        <button class="close-modal-btn" onclick="closeModalAndCloseWindow()">好的 ✨</button>
    </div>
</div>

<div class="card" id="mainCard">
    <div class="hero">
        <img class="logo" src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="一點甜 Logo" onerror="this.style.display='none'">
        <h2 id="actName">遇見你，就是一點甜...</h2>
        <div class="sub">填寫回饋 · 領取限定優惠</div>
    </div>

    <div class="form-container">
        <div id="loadingArea" class="loading-state">
            <div class="spinner"></div>
            <p>攪拌甜蜜中，請稍候片刻... 🍰</p>
        </div>

        <form id="quizForm" style="display: none;">
    <div class="form-group">
        <label><i>🍰</i> 試吃品項</label>
        <select id="item" required></select>
    </div>
    <div class="form-group">
        <label><i>👁️</i> 視覺吸引力</label>
        <select id="visual" required></select>
    </div>
    <div class="form-group">
        <label><i>😋</i> 極致口感</label>
        <select id="texture" required></select>
    </div>
    <div class="form-group">
        <label><i>⚖️</i> 風味平衡</label>
        <select id="balance" required></select>
    </div>
    <div class="form-group">
        <label><i>👥</i> 您的性別</label>
        <select id="identity" required></select>
    </div>
    <div class="form-group">
        <label><i>📅</i> 您的年紀</label>
        <select id="age" required></select>
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">
        ✨ 提交問卷 · 領優惠券 ✨
    </button>
    <div class="sweet-note">
        🧁 您的每一份意見，都是我們更甜蜜的動力
    </div>
</form>
    </div>
</div>

<script>
    // ----- 完整保留原有功能邏輯 -----
    const LIFF_ID = '2009574561-O1KcpV0n';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTugMVmQ4dWa3DXvuXoZKHOsR5qtkXpbnzlLh0eN6Lel-SU4p7I3YOD2aGbdYnLPtR/exec';
    let userId = "";

    function showSuccessModal() {
        const modal = document.getElementById('successModal');
        modal.classList.add('active');
    }

    function closeModalAndCloseWindow() {
        const modal = document.getElementById('successModal');
        modal.classList.remove('active');
        if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
            liff.closeWindow();
        } else {
            window.close();
        }
    }

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
            liff.login();
        } else {
            const profile = await liff.getProfile();
            userId = profile.userId;
            fetchOptions();
        }
    }

    async function fetchOptions() {
        try {
            const resp = await fetch(GAS_URL);
            const data = await resp.json();
            document.getElementById('actName').innerText = data.title || "一點甜試吃活動";
            fillSelect('item', data.items);
            fillSelect('visual', data.visuals);
            fillSelect('texture', data.texture);
            fillSelect('balance', data.balance);
            fillSelect('identity', data.identity);
            fillSelect('age', data.age);

            document.getElementById('loadingArea').style.display = 'none';
            document.getElementById('quizForm').style.display = 'block';
        } catch (err) {
            document.getElementById('loadingArea').innerHTML = '<p>🍂 無法載入問卷，請重新整理</p><button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;border-radius:40px;border:none;background:#f4d1d7;color:#4a2a2a;cursor:pointer;">重新整理</button>';
        }
    }

    function fillSelect(id, list) {
        const el = document.getElementById(id);
        el.innerHTML = '<option value="" disabled selected>請選擇</option>';
        if (!list || list.length === 0) return;
        list.forEach(txt => {
            const opt = document.createElement('option');
            opt.value = opt.text = txt;
            el.appendChild(opt);
        });
    }

    document.getElementById('quizForm').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = "📨 提交中，請稍後...";

        const payload = {
            userId: userId,
            activity: document.getElementById('actName').innerText,
            item: document.getElementById('item').value,
            visual: document.getElementById('visual').value,
            texture: document.getElementById('texture').value,
            balance: document.getElementById('balance').value,
            identity: document.getElementById('identity').value,
            age: document.getElementById('age').value
        };

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            
            showSuccessModal();
            
        } catch (err) {
            alert('發送失敗，請稍後再試');
            submitBtn.disabled = false;
            submitBtn.innerHTML = "✨ 提交問卷 · 領優惠券 ✨";
        }
    };

    init();
</script>
</body>
</html>
