<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: #fef7e8; 
      font-family: "Noto Sans TC", sans-serif; 
      padding: 15px; 
      color: #444; 
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container { 
      max-width: 500px; 
      width: 100%;
      margin: 0 auto; 
      background: white; 
      border-radius: 25px; 
      padding: 40px 20px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      text-align: center; 
    }
    
    .logo { 
      width: 120px; 
      height: auto; 
      margin-bottom: 20px; 
      animation: gentleFloat 2s ease-in-out infinite;
    }
    
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    
    /* 載入動畫 */
    .loading-wrap {
      padding: 40px 0;
    }
    .donut {
      width: 60px;
      height: 60px;
      margin: 20px auto;
      position: relative;
    }
    .donut:before {
      content: '';
      display: block;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 6px solid #f9ebda;
      border-top-color: #c26e3c;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .loading-text {
      font-size: 1.1rem;
      color: #c26e3c;
      margin-top: 20px;
      font-weight: 500;
    }
    .loading-sub {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 8px;
    }
    
    /* 問卷樣式 */
    h1 { 
      color: #c26e3c; 
      font-size: 1.3rem; 
      margin-bottom: 20px; 
      margin-top: 5px; 
      font-weight: bold;
    }
    form { 
      text-align: left; 
      margin-top: 20px;
    }
    .q-box { 
      background: #fffaf2; 
      padding: 18px; 
      border-radius: 15px; 
      margin-bottom: 20px; 
      border: 1px solid #f9ebda; 
    }
    .q-title { 
      font-weight: bold; 
      display: block; 
      color: #5a3e2b; 
      margin-bottom: 15px; 
      font-size: 1rem; 
      border-left: 4px solid #c26e3c; 
      padding-left: 10px; 
    }
    .opt-item { 
      display: flex; 
      align-items: flex-start; 
      margin-bottom: 12px; 
      cursor: pointer; 
      padding: 8px; 
      border-radius: 8px; 
      transition: 0.2s; 
    }
    .opt-item:hover { 
      background: #fdf2e4; 
    }
    input[type="radio"] { 
      margin-right: 12px; 
      margin-top: 4px; 
      transform: scale(1.3); 
      accent-color: #c26e3c;
    }
    .opt-text { 
      font-size: 0.95rem; 
      color: #666; 
    }
    select, textarea { 
      width: 100%; 
      padding: 12px; 
      border-radius: 12px; 
      border: 1px solid #ddd; 
      margin-top: 5px; 
      box-sizing: border-box; 
      font-size: 1rem;
      font-family: inherit;
    }
    button { 
      width: 100%; 
      padding: 16px; 
      background: #c26e3c; 
      color: white; 
      border: none; 
      border-radius: 30px; 
      margin-top: 25px; 
      font-weight: bold; 
      font-size: 1.1rem; 
      cursor: pointer; 
      transition: opacity 0.2s;
      font-family: inherit;
    }
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
    }
    label { 
      font-weight: bold; 
      color: #5a3e2b; 
      display: block; 
      margin-bottom: 5px; 
      margin-top: 15px; 
    }
    
    /* 錯誤頁面 */
    .error-wrap {
      padding: 20px;
      color: #d32f2f;
    }
    .retry-btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #c26e3c;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container" id="loadingContainer">
    <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="一點甜 LOGO" class="logo">
    <div class="loading-wrap">
      <div class="donut"></div>
      <div class="loading-text">正在為你的生活，加入一點甜...</div>
      <div class="loading-sub">捕捉今日份的甜，請稍候片刻</div>
    </div>
  </div>
  
  <div class="container" id="questionContainer" style="display:none;">
    <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="一點甜 LOGO" class="logo">
    <h1 id="actTitle">一點甜Gelato霜淇淋品評</h1>
    
    <form id="quizForm">
      <label>🍦 請選擇試吃品項</label>
      <select id="flavorSelect" required>
        <option value="">請選擇品項</option>
      </select>
      
      <div id="dynamicQuestions" style="margin-top: 25px;"></div>

      <label>✍️ 您的具體建議</label>
      <textarea id="commentInput" rows="3" placeholder="例如：甜度、份量、口感..."></textarea>
      
      <button type="submit" id="submitBtn">提交問卷 領優惠券</button>
    </form>
  </div>

  <script>
    let userId = null;
    let liff = null;
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyQVWYgnKGP-W5ddxOoLprz_f3s2rxn7HwtoeQ7KxpJ4cL_42n16Q_IP7jsoJZBa9qD/exec';
    const LIFF_ID = '2009574561-O1KcpV0n';

    // ========== 工具函數 ==========
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showError(message) {
      document.getElementById('loadingContainer').innerHTML = `
        <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" alt="一點甜 LOGO" class="logo">
        <div class="error-wrap">
          <p>❌ 載入失敗：${escapeHtml(message)}</p>
          <button class="retry-btn" onclick="location.reload()">重新載入</button>
        </div>
      `;
    }

    // ========== 初始化 LIFF ==========
    async function initLiff() {
      try {
        // 載入 LIFF SDK
        if (!window.liff) {
          await new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://static.line-scdn.net/liff/edge/2.1/sdk.js';
            script.onload = () => resolve();
            script.onerror = () => reject(new Error('LIFF SDK 載入失敗'));
            document.head.appendChild(script);
          });
        }
        liff = window.liff;

        // 初始化 LIFF
        await liff.init({ liffId: LIFF_ID });
        
        // 取得使用者 ID
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          userId = profile.userId;
          console.log('取得使用者 ID 成功:', userId);
        } else {
          liff.login();
          return;
        }
      } catch (err) {
        console.warn('LIFF 初始化失敗，使用訪客模式:', err);
        userId = 'guest_' + Date.now();
      }
    }

    // ========== 載入問卷資料 ==========
    async function loadQuestionnaire() {
      try {
        // 加入時間戳避免快取，設定10秒超時
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const response = await fetch(`${GAS_URL}?action=getQuestionnaire&t=${Date.now()}`, {
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!response.ok) throw new Error(`HTTP 錯誤：${response.status}`);
        
        const data = await response.json();
        if (!data.success) throw new Error(data.message || '問卷資料錯誤');

        // 渲染問卷
        renderQuestionnaire(data);
        // 切換到問卷頁面
        document.getElementById('loadingContainer').style.display = 'none';
        document.getElementById('questionContainer').style.display = 'block';
      } catch (err) {
        console.error('載入問卷失敗:', err);
        showError(err.message);
      }
    }

    // ========== 渲染問卷 ==========
    function renderQuestionnaire(data) {
      const { actName, flavorList, questions } = data;
      
      // 設定活動名稱
      document.getElementById('actTitle').textContent = actName;
      
      // 渲染品項選單
      const flavorSelect = document.getElementById('flavorSelect');
      flavorSelect.innerHTML = '<option value="">請選擇品項</option>';
      flavorList.forEach(flavor => {
        const option = document.createElement('option');
        option.value = flavor;
        option.textContent = flavor;
        flavorSelect.appendChild(option);
      });

      // 渲染動態題目（自動提取分數：選項開頭的數字，如「5-...」取5分）
      const questionsContainer = document.getElementById('dynamicQuestions');
      questionsContainer.innerHTML = '';
      
      questions.forEach((q, qIndex) => {
        const optionsHtml = q.options.map((optLabel, optIndex) => {
          // 自動提取分數：如果選項開頭是數字+「-」，就取該數字；否則用5-索引
          let score;
          const scoreMatch = optLabel.match(/^(\d+)-/);
          if (scoreMatch) {
            score = scoreMatch[1];
          } else {
            score = 5 - optIndex;
          }
          return `
            <label class="opt-item">
              <input type="radio" name="q${qIndex}" value="${score}" required>
              <span class="opt-text">${escapeHtml(optLabel)}</span>
            </label>
          `;
        }).join('');

        questionsContainer.innerHTML += `
          <div class="q-box">
            <span class="q-title">${qIndex + 1}. ${escapeHtml(q.title)}</span>
            <div class="options-list">${optionsHtml}</div>
          </div>
        `;
      });

      // 綁定提交事件
      document.getElementById('quizForm').addEventListener('submit', handleSubmit);
    }

    // ========== 處理提交 ==========
    // ========== 處理提交 (修正版) ==========
    async function handleSubmit(e) {
      e.preventDefault();
      
      const flavorSelect = document.getElementById('flavorSelect');
      if (!flavorSelect.value) {
        alert('請選擇試吃品項');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';

      // 1. 收集分數
      const qBoxes = document.querySelectorAll('.q-box');
      const scores = Array.from(qBoxes).map((_, qIndex) => {
        const checked = document.querySelector(`input[name="q${qIndex}"]:checked`);
        return checked ? checked.value : '0';
      });

      const actName = document.getElementById('actTitle').textContent;
      const comment = document.getElementById('commentInput').value;

      // 2. 準備發送的資料
      const payload = {
        action: 'saveFeedback',
        userId: userId, // 這是從 initLiff 拿到的 LINE ID
        actName: actName,
        flavor: flavorSelect.value,
        scores: scores,
        comment: comment
      };

      try {
        // 【關鍵修復點】: 使用 no-cors 模式發送
        // 因為 GAS 會進行 302 重定向，一般 fetch 會噴 CORS 錯誤
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors', // 讓瀏覽器不要去檢查 Google 的回傳內容，只管把資料送過去
          headers: {
            'Content-Type': 'text/plain' // 設為純文字，避開瀏覽器的檢查機制
          },
          body: JSON.stringify(payload)
        });

        // 3. 因為 no-cors 模式下拿不到回傳的 JSON (會是空的)
        // 所以我們直接假設資料已經平安抵達 GAS，顯示成功畫面
        document.body.innerHTML = `
          <div style="text-align:center;padding:100px 20px;background:#fef7e8;min-height:100vh;">
            <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" style="width:100px;margin-bottom:20px;">
            <h2 style="color:#c26e3c;">🎉 提交成功！</h2>
            <p>優惠券已發送到您的 LINE 視窗。<br>請回對話視窗領取！</p>
            <button onclick="if(window.liff) liff.closeWindow(); else window.close();" 
              style="margin-top:30px;padding:12px 24px;background:#c26e3c;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">
              關閉視窗
            </button>
          </div>
        `;

      } catch (err) {
        console.error('提交失敗:', err);
        alert('系統繁忙，請稍後再試！');
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    }

    // ========== 啟動應用 ==========
    async function startApp() {
      try {
        // 並行執行 LIFF 初始化與問卷載入，提升速度
        await Promise.allSettled([
          initLiff(),
          loadQuestionnaire()
        ]);
      } catch (err) {
        console.error('應用啟動失敗:', err);
        showError(err.message);
      }
    }

    startApp();
  </script>
</body>
</html>
