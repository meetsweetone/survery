<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #fef7e8; font-family: sans-serif; padding: 15px; color: #444; line-height: 1.5; }
    .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 25px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    .logo { width: 120px; margin-bottom: 10px; }
    h1 { color: #c26e3c; font-size: 1.3rem; }
    form { text-align: left; margin-top: 20px; }
    .q-box { background: #fffaf2; padding: 18px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #f9ebda; }
    .q-title { font-weight: bold; color: #5a3e2b; margin-bottom: 15px; border-left: 4px solid #c26e3c; padding-left: 10px; }
    .opt-item { display: flex; align-items: flex-start; margin-bottom: 12px; }
    input[type=radio] { margin-right: 12px; transform: scale(1.3); }
    select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
    button { width: 100%; padding: 16px; background: #c26e3c; color: white; border: none; border-radius: 30px; margin-top: 25px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
  </style>
</head>

<body>
  <div class="container" id="loading">
    <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" class="logo">
    <p>正在載入問卷...</p>
  </div>

  <div class="container" id="main" style="display:none">
    <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" class="logo">
    <h1 id="actTitle"></h1>
    <form id="quiz">
      <label>🍦 請選擇試吃品項</label>
      <select id="flavorSelect" required></select>
      <div id="dynamicQuestions"></div>
      <label>✍️ 您的具體建議</label>
      <textarea id="comment" rows="3"></textarea>
      <button type="submit">提交問卷 領優惠券</button>
    </form>
  </div>

  <script>
    // ======================
    // 你只要填這兩個
    // ======================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyQVWYgnKGP-W5ddxOoLprz_f3s2rxn7HwtoeQ7KxpJ4cL_42n16Q_IP7jsoJZBa9qD/exec";
    const LIFF_ID = "2009574561-O1KcpV0n";

    let userId = "guest";
    let actName = "";
    let questions = [];

    // ==============================================
    // 重點：先載入問卷，再跑 LIFF，「永遠不會卡住」
    // ==============================================
    window.onload = async function () {
      await loadSurvey(); // 先載入問卷
      initLiff();        // 再背景跑 LIFF
    };

    async function loadSurvey() {
      try {
        let res = await fetch(GAS_URL + "?action=getSurvey");
        let data = await res.json();

        actName = data.actName;
        questions = data.questions;
        document.getElementById("actTitle").innerText = actName;

        data.flavorList.forEach(f => {
          let opt = document.createElement("option");
          opt.value = f;
          opt.innerText = f;
          document.getElementById("flavorSelect").appendChild(opt);
        });

        questions.forEach((q, idx) => {
          let opts = q.options.map((opt, j) => {
            let score = 5 - j;
            return `<label class="opt-item"><input type="radio" name="q${idx}" value="${score}" required><span>${opt}</span></label>`;
          }).join('');
          document.getElementById("dynamicQuestions").innerHTML += `
            <div class="q-box">
              <div class="q-title">${idx+1}. ${q.title}</div>${opts}
            </div>`;
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("main").style.display = "block";
      } catch (e) {
        alert("載入失敗：" + e);
      }
    }

    async function initLiff() {
      try {
        let script = document.createElement('script');
        script.src = 'https://static.line-scdn.net/liff/edge/2.1/sdk.js';
        script.onload = async () => {
          await liff.init({ liffId: LIFF_ID });
          if (liff.isLoggedIn()) {
            let p = await liff.getProfile();
            userId = p.userId;
          }
        };
        document.head.appendChild(script);
      } catch (e) {}
    }

    document.getElementById("quiz").onsubmit = async (e) => {
      e.preventDefault();
      let btn = e.submitter;
      btn.disabled = true;
      btn.innerText = "送出中...";

      let scores = questions.map((_, i) => {
        let c = document.querySelector(`input[name=q${i}]:checked`);
        return c ? c.value : "0";
      });

      await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          userId, actName,
          flavor: document.getElementById("flavorSelect").value,
          scores,
          comment: document.getElementById("comment").value
        })
      });

      document.body.innerHTML = `<div style='text-align:center;padding:100px;background:#fef7e8'><img src='https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png' style='width:100px'><br><h2>🎉 提交成功！</h2><p>優惠券已發送</p></div>`;
    };
  </script>
</body>
</html>
