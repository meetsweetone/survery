<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{background:#fef7e8;font-family:sans-serif;padding:15px}
    .container{max-width:500px;margin:0 auto;background:white;border-radius:25px;padding:20px;text-align:center}
    .logo{width:120px}
    h1{color:#c26e3c}
    form{text-align:left}
    .q-box{background:#fffaf2;padding:18px;border-radius:15px;margin:20px 0}
    .q-title{font-weight:bold;border-left:4px solid #c26e3c;padding-left:10px;margin-bottom:10px}
    .opt-item{display:flex;gap:8px;margin:8px 0}
    input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd}
    button{width:100%;padding:16px;background:#c26e3c;color:white;border:none;border-radius:30px;margin-top:20px;font-weight:bold}
  </style>
</head>
<body>

<div class="container" id="loading">
  <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" class="logo">
  <p>正在載入問卷...</p>
</div>

<div class="container" id="main" style="display:none">
  <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" class="logo">
  <h1 id="title"></h1>
  <form id="quiz">
    <label>🍦 試吃品項</label>
    <select id="flavor" required></select>
    <div id="questions"></div>
    <label>✍️ 建議</label>
    <textarea id="comment" rows="3"></textarea>
    <button type="submit">提交問卷 領優惠券</button>
  </form>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyQVWYgnKGP-W5ddxOoLprz_f3s2rxn7HwtoeQ7KxpJ4cL_42n16Q_IP7jsoJZBa9qD/exec";
  const LIFF_ID = "2009574561-O1KcpV0n";
  let userId = "guest";
  let survey = {};

  // 直接載入，完全不依賴 CORS
  (async () => {
    const res = await fetch(GAS_URL + "?action=getSurvey");
    survey = await res.json();
    document.getElementById("title").innerText = survey.actName;

    survey.flavorList.forEach(f => {
      const opt = document.createElement("option");
      opt.value = f;
      opt.innerText = f;
      document.getElementById("flavor").append(opt);
    });

    const qEl = document.getElementById("questions");
    survey.questions.forEach((q, idx) => {
      const opts = q.options.map((o, i) => `
        <label class="opt-item">
          <input type="radio" name="q${idx}" value="${5 - i}" required>
          <span>${o}</span>
        </label>
      `).join("");
      qEl.innerHTML += `<div class="q-box"><div class="q-title">${idx+1}. ${q.title}</div>${opts}</div>`;
    });

    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
    initLiff();
  })();

  async function initLiff() {
    try {
      const s = document.createElement("script");
      s.src = "https://static.line-scdn.net/liff/edge/2.1/sdk.js";
      s.onload = async () => {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) userId = (await liff.getProfile()).userId;
      };
      document.head.append(s);
    } catch (e) {}
  }

  // 提交，完全無 CORS
  document.getElementById("quiz").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = e.submitter;
    btn.disabled = true;
    btn.innerText = "送出中...";

    const scores = survey.questions.map((_, i) =>
      document.querySelector(`input[name="q${i}"]:checked`)?.value || "0"
    );

    await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        userId,
        actName: survey.actName,
        flavor: document.getElementById("flavor").value,
        scores,
        comment: document.getElementById("comment").value
      })
    });

    document.body.innerHTML = `
      <div style="text-align:center;padding:100px;background:#fef7e8">
        <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" style="width:100px">
        <h2>🎉 提交成功</h2><p>優惠券已發送</p>
      </div>`;
  });
</script>
</body>
</html>
