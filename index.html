<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #fef7e8; font-family: sans-serif; padding: 15px; color: #444; line-height: 1.5; }
    .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 25px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    .logo { width: 120px; height: auto; margin-bottom: 10px; }
    h1 { color: #c26e3c; font-size: 1.3rem; margin-bottom: 20px; margin-top: 5px; }
    form { text-align: left; }
    .q-box { background: #fffaf2; padding: 18px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #f9ebda; }
    .q-title { font-weight: bold; display: block; color: #5a3e2b; margin-bottom: 15px; font-size: 1rem; border-left: 4px solid #c26e3c; padding-left: 10px; }
    .opt-item { display: flex; align-items: flex-start; margin-bottom: 12px; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; }
    .opt-item:hover { background: #fdf2e4; }
    input[type="radio"] { margin-right: 12px; margin-top: 4px; transform: scale(1.3); }
    .opt-text { font-size: 0.95rem; color: #666; }
    select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-top: 5px; box-sizing: border-box; font-size: 1rem; }
    button { width: 100%; padding: 16px; background: #c26e3c; color: white; border: none; border-radius: 30px; margin-top: 25px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    label { font-weight: bold; color: #5a3e2b; display: block; margin-bottom: 5px; margin-top: 15px; }
    .loading { padding: 40px 0; }
  </style>
</head>
<body>

  <div class="container" id="loading">
    <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" class="logo">
    <p>正在載入問卷...</p>
  </div>

  <div class="container" id="main" style="display:none">
    <img src="https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png" class="logo">
    <h1 id="actTitle">一點甜品評問卷</h1>
    <form id="quiz">
      <label>🍦 請選擇試吃品項</label>
      <select id="flavorSelect" required></select>
      <div id="dynamicQuestions" style="margin-top:25px"></div>
      <label>✍️ 您的具體建議</label>
      <textarea id="comment" rows="3" placeholder="例如：甜度、份量、口感..."></textarea>
      <button type="submit" id="subBtn">提交問卷 領優惠券</button>
    </form>
  </div>

  <script>
    const GAS_URL = "你的GAS網址";
    let userId = "guest";
    let actName = "";
    let questions = [];

    async function initLiff() {
      try {
        const script = document.createElement('script');
        script.src = 'https://static.line-scdn.net/liff/edge/2.1/sdk.js';
        await new Promise(res => script.onload = res);
        await liff.init({ liffId: "2009574561-O1KcpV0n" });
        if (liff.isLoggedIn()) {
          const p = await liff.getProfile();
          userId = p.userId;
        } else {
          liff.login();
        }
      } catch (e) {}
    }

    async function loadSurvey() {
      const res = await fetch(GAS_URL + "?action=getSurvey");
      const data = await res.json();
      actName = data.actName;
      questions = data.questions;

      document.getElementById('actTitle').innerText = actName;
      const f = document.getElementById('flavorSelect');
      data.flavorList.forEach(x => {
        const o = document.createElement('option');
        o.value = x; o.innerText = x;
        f.appendChild(o);
      });

      const qc = document.getElementById('dynamicQuestions');
      questions.forEach((q, i) => {
        const opts = q.options.map((opt, j) => {
          const score = 5 - j;
          return `<label class="opt-item"><input type="radio" name="q${i}" value="${score}" required><span class="opt-text">${opt}</span></label>`;
        }).join('');
        qc.innerHTML += `<div class="q-box"><span class="q-title">${i+1}. ${q.title}</span>${opts}</div>`;
      });

      document.getElementById('loading').style.display = 'none';
      document.getElementById('main').style.display = 'block';
    }

    document.getElementById('quiz').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('subBtn');
      btn.disabled = true; btn.innerText = "送出中...";

      const scores = questions.map((_, i) => {
        const c = document.querySelector(`input[name="q${i}"]:checked`);
        return c ? c.value : "0";
      });

      await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          userId, actName,
          flavor: document.getElementById('flavorSelect').value,
          scores,
          comment: document.getElementById('comment').value
        })
      });

      document.body.innerHTML = `<div style='text-align:center;padding:100px 20px;background:#fef7e8'><img src='https://i.postimg.cc/SNhTdvv9/yi-dian-tian-288x.png' style='width:100px'><br><h2>🎉 提交成功！</h2><p>優惠券已發送</p></div>`;
    };

    (async () => {
      await initLiff();
      await loadSurvey();
    })();
  </script>
</body>
</html>
